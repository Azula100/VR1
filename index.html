<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<title>GLB Loader</title>
<style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; }
  </style>
<script type="importmap">
{
"imports":{
"three":"https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
"three/addons/":"https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
}
}
</script>
</head>
<body>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { VRButton } from "three/addons/webxr/VRButton.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202025);

// Камер
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 3); // Хүний өндрөөр байрлуулах

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// VR товчлуур
document.body.appendChild(VRButton.createButton(renderer));

// Тусгай гэрэл
const light = new THREE.HemisphereLight(0xffffff, 0x444444);
light.position.set(0, 20, 0);
scene.add(light);

const dirLight = new THREE.DirectionalLight(0xffffff);
dirLight.position.set(3, 10, 10);
scene.add(dirLight);

const loader = new GLTFLoader();
loader.load(
  "./lab4.glb",
   function (gltf) {
    const model = gltf.scene;

    // VR-д зөв байрлуулах
    model.position.set(0, 0, -1);  // хэрэглэгчээс 1м урд
    model.scale.set(1, 1, 1);      // Хэмжээг тохируулах
    scene.add(model);
    console.log('GLB файл ачааллаа');
  },
  undefined,
  function (error) {
    console.error('GLB файл ачаалж чадсангүй:', error);
  }
);

// Animation loop
function animate() {
  renderer.setAnimationLoop(render);
}

function render() {
  renderer.render(scene, camera);
}

animate();

// Canvas resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
